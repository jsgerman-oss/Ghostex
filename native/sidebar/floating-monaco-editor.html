<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta
      content="width=device-width, initial-scale=1.0"
      name="viewport"
    />
    <style>
      html,
      body,
      #editor {
        height: 100%;
        margin: 0;
        overflow: hidden;
        width: 100%;
      }

      body {
        background: #151515;
      }
    </style>
    <script src="./monaco/vs/loader.js"></script>
  </head>
  <body>
    <div id="editor"></div>
    <script>
      window.MonacoEnvironment = {
        getWorkerUrl: function () {
          return "./monaco/vs/base/worker/workerMain.js";
        },
      };

      require.config({
        paths: {
          vs: "./monaco/vs",
        },
      });

      /*
       * CDXC:PromptEditor 2026-05-28-07:47:
       * Opening the standalone Monaco prompt editor and pasting plain text into
       * it should remove spaces at line ends, matching the rich modal editor
       * so direct native overlays do not preserve invisible trailing whitespace.
       */
      function trimPromptEditorTrailingSpaces(text) {
        return text.replace(/[ \t]+(?=\r\n|\n|\r|$)/g, "");
      }

      function endPositionAfterInsertedText(start, text) {
        const lines = text.replace(/\r\n/g, "\n").replace(/\r/g, "\n").split("\n");
        if (lines.length === 1) {
          return {
            column: start.column + text.length,
            lineNumber: start.lineNumber,
          };
        }
        return {
          column: lines[lines.length - 1].length + 1,
          lineNumber: start.lineNumber + lines.length - 1,
        };
      }

      require(["vs/editor/editor.main"], function () {
        const initialText =
          typeof window.__GHOSTEX_MONACO_INITIAL_TEXT__ === "string"
            ? trimPromptEditorTrailingSpaces(window.__GHOSTEX_MONACO_INITIAL_TEXT__)
            : "";
        const language =
          typeof window.__GHOSTEX_MONACO_LANGUAGE__ === "string" && window.__GHOSTEX_MONACO_LANGUAGE__
            ? window.__GHOSTEX_MONACO_LANGUAGE__
            : "markdown";

        const editor = monaco.editor.create(document.getElementById("editor"), {
          acceptSuggestionOnEnter: "off",
          automaticLayout: true,
          cursorBlinking: "smooth",
          fontFamily:
            "JetBrains Mono, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', monospace",
          fontLigatures: true,
          fontSize: 14,
          language,
          lineNumbersMinChars: 3,
          minimap: {
            enabled: false,
          },
          /*
           * CDXC:PromptEditor 2026-05-15-20:09:
           * The standalone Ctrl+G Monaco prompt editor shares the rich prompt
           * writing behavior: caret placement on a word must not highlight
           * every matching word as if this were code navigation.
           *
           * CDXC:PromptEditor 2026-05-15-20:36:
           * Keep the standalone prompt editor aligned with the rich prompt
           * modal: disable selection match highlights, active-line highlighting,
           * and syntax-highlighted clipboard output for plain prompt text.
           */
          occurrencesHighlight: "off",
          copyWithSyntaxHighlighting: false,
          padding: {
            bottom: 48,
            top: 12,
          },
          parameterHints: {
            enabled: false,
          },
          quickSuggestions: false,
          renderLineHighlight: "none",
          scrollBeyondLastLine: false,
          selectionHighlight: false,
          snippetSuggestions: "none",
          suggestOnTriggerCharacters: false,
          tabCompletion: "off",
          theme: "vs-dark",
          value: initialText,
          wordBasedSuggestions: "off",
          wordWrap: "on",
        });

        window.ghostexMonacoGetValue = function () {
          return editor.getValue();
        };

        document.getElementById("editor").addEventListener(
          "paste",
          function (event) {
            const pastedText = event.clipboardData ? event.clipboardData.getData("text/plain") : "";
            const trimmedText = trimPromptEditorTrailingSpaces(pastedText);
            if (!pastedText || trimmedText === pastedText) {
              return;
            }
            const selection = editor.getSelection();
            if (!selection) {
              return;
            }
            const startPosition = {
              column: selection.startColumn,
              lineNumber: selection.startLineNumber,
            };
            const endPosition = endPositionAfterInsertedText(startPosition, trimmedText);
            event.preventDefault();
            event.stopPropagation();
            editor.pushUndoStop();
            editor.executeEdits("ghostex-trimmed-text-paste", [
              {
                forceMoveMarkers: true,
                range: selection,
                text: trimmedText,
              },
            ]);
            editor.setPosition(endPosition);
            editor.revealPositionInCenterIfOutsideViewport(endPosition);
            editor.pushUndoStop();
            editor.focus();
          },
          true,
        );

        editor.focus();
      });
    </script>
  </body>
</html>
