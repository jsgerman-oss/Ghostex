name: ghostex
options:
  bundleIdPrefix: com.madda.ghostex
  deploymentTarget:
    macOS: "13.0"
configs:
  Debug: debug
  Release: release
settings:
  base:
    CLANG_ENABLE_MODULES: YES
    # CDXC:PublicRelease 2026-04-27-05:36: Public source must not commit a
    # maintainer's Apple signing identity. Developers can set signing locally
    # in Xcode or with an untracked config.
    CODE_SIGN_STYLE: Automatic
    # CDXC:AutoUpdate 2026-05-16-20:22: Sparkle compares CFBundleVersion, not
    # only CFBundleShortVersionString. Release builds use semver-derived numeric
    # build values so each public update is greater than earlier installs.
    CURRENT_PROJECT_VERSION: 30200
    GENERATE_INFOPLIST_FILE: YES
    LD_RUNPATH_SEARCH_PATHS:
      - "$(inherited)"
      - "@executable_path/../Frameworks"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    # CDXC:Distribution 2026-05-16-20:22: Homebrew and Sparkle release v3.2.0 must
    # publish a notarized Developer ID Ghostex app whose bundle metadata
    # matches both GitHub release assets, Sparkle appcasts, and the
    # architecture-aware ghostex brew cask.
    MARKETING_VERSION: "3.2.0"
    SDKROOT: macosx
    SWIFT_VERSION: "5.0"
    # CDXC:ChromiumBrowserPanes 2026-05-04-16:38: Swift needs both Ghostty's
    # C bridge and the local CEF browser bridge. Route through a local bridging
    # header so Chromium panes can be native AppKit views without replacing the
    # existing Ghostty bridge contract.
    SWIFT_OBJC_BRIDGING_HEADER: Sources/ghostexHost/GhostexHost-Bridging-Header.h
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.6.3
targets:
  ghostex:
    type: application
    platform: macOS
    productName: ${GHOSTEX_APP_NAME}
    info:
      # CDXC:DevAppFlavor 2026-05-09-16:24: `bun s` generates ghostex-dev
      # bundle metadata. Write variant-specific Info.plists into the ignored
      # native build directory so dev starts do not dirty tracked source files.
      path: build/AppInfo-${GHOSTEX_APP_NAME}.plist
      properties:
        CFBundleShortVersionString: ${MARKETING_VERSION}
        # CDXC:DevAppFlavor 2026-04-28-03:13: Custom storage keys must be
        # emitted into Info.plist explicitly. The generated INFOPLIST_KEY_*
        # build settings do not reliably materialize mixed-case custom keys,
        # so LaunchServices-installed ghostex-dev must read the same storage split
        # as shell-launched builds from concrete bundle metadata.
        GHOSTEXHomeDirectoryName: ${GHOSTEX_HOME_DIRECTORY_NAME}
        GHOSTEXSharedHomeDirectoryName: ${GHOSTEX_SHARED_HOME_DIRECTORY_NAME}
        # CDXC:AutoUpdate 2026-05-02-06:51: Release builds use Sparkle's
        # appcast updater, matching DockDoor's native macOS update model.
        # Keep the feed and EdDSA public key in build variables so release
        # automation can provide the real signing material without committing
        # private keys or environment-specific values.
        SUEnableDownloaderService: true
        SUEnableInstallerLauncherService: true
        SUFeedURL: ${GHOSTEX_SPARKLE_FEED_URL}
        SUPublicEDKey: ${GHOSTEX_SPARKLE_PUBLIC_ED_KEY}
        # CDXC:ChromiumBrowserPanes 2026-05-04-17:20: Chromium can probe
        # paired Bluetooth devices during Google sign-in, passkey, security-key,
        # or Web Bluetooth flows. macOS TCC terminates apps that access
        # Bluetooth without this usage string, so every generated app plist must
        # include it before CEF browser panes are enabled.
        NSBluetoothAlwaysUsageDescription: Ghostex uses Bluetooth only when a website in a Chromium browser pane requests browser features such as passkeys, security keys, or Bluetooth devices.
    sources:
      - path: Sources/Shared
      - path: Sources/ghostexHost
        excludes:
          # CDXC:NativeBuild 2026-05-06-01:05: Chromium browser panes now call
          # the CEF bridge from Swift, and build-ghostex-host vendors CEF before
          # project generation. Keep only the bridging header out of sources so
          # the ObjC++ bridge object links whenever `bun run start` rebuilds.
          - GhostexHost-Bridging-Header.h
      - path: ${GHOSTTY_ROOT}/macos/Sources/Ghostty
        excludes:
          - Surface View/SurfaceView_UIKit.swift
      - path: ${GHOSTTY_ROOT}/macos/Sources/Helpers
      - path: ${GHOSTTY_ROOT}/macos/Sources/Features/Secure Input
      - path: ${GHOSTTY_ROOT}/macos/Sources/Features/Terminal/TerminalTabColor.swift
      - path: ${GHOSTTY_ROOT}/macos/Sources/Features/Terminal/TerminalViewContainer.swift
      - path: ${GHOSTTY_ROOT}/macos/Sources/Features/QuickTerminal/QuickTerminalPosition.swift
      - path: ${GHOSTTY_ROOT}/macos/Sources/Features/QuickTerminal/QuickTerminalScreen.swift
      - path: ${GHOSTTY_ROOT}/macos/Sources/Features/QuickTerminal/QuickTerminalSize.swift
      - path: ${GHOSTTY_ROOT}/macos/Sources/Features/QuickTerminal/QuickTerminalSpaceBehavior.swift
      - path: ${GHOSTTY_ROOT}/macos/Sources/Features/Splits/SplitTree.swift
      - path: ${GHOSTTY_ROOT}/macos/Sources/Features/Splits/SplitView.swift
      - path: ${GHOSTTY_ROOT}/macos/Sources/Features/Splits/SplitView.Divider.swift
      # CDXC:NativeTerminals 2026-04-26-07:11: Embedded Ghostty must ship
      # Ghostty's runtime resources, especially bundled themes, so user
      # settings such as `theme = GitHub Dark Default` resolve inside ghostex.
      - path: ${GHOSTTY_ROOT}/zig-out/share/ghostty
        buildPhase: resources
        type: folder
      # CDXC:NativeTerminals 2026-04-26-07:29: When Ghostty has a resource
      # directory it exports TERM=xterm-ghostty and TERMINFO beside that
      # directory. Bundle matching terminfo data so zsh/readline input behaves
      # normally instead of using a missing terminal description.
      - path: ${GHOSTTY_ROOT}/zig-out/share/terminfo
        buildPhase: resources
        type: folder
      # CDXC:NativeSidebar 2026-04-27-06:19: The installed native app must
      # load the full sidebar when launched from /Applications. Bundle the
      # generated Web assets so LaunchServices current-directory differences
      # cannot send users to the minimal emergency shell UI.
      - path: Web
        buildPhase: resources
        type: folder
      # CDXC:Branding 2026-05-08-18:04: The installed macOS app must use the
      # same app icon as agent-manager-x. Bundle its AppIcon asset catalog here
      # so Finder, Dock, app switcher, and signed release builds all resolve the
      # compiled icon from Xcode instead of falling back to a generic app icon.
      - path: Resources/Assets.xcassets
        buildPhase: resources
    dependencies:
      - framework: ${GHOSTTY_ROOT}/macos/GhosttyKit.xcframework
        embed: false
      - package: Sparkle
        product: Sparkle
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # CDXC:Branding 2026-05-12-07:35: The native app must present as
        # Ghostex everywhere users see it, including the .app bundle, process
        # executable, menu title, and window title. Internal target, bundle,
        # storage, and protocol names can remain ghostex implementation details.
        # CDXC:DevAppFlavor 2026-04-28-02:01: Dev scripts override these
        # generated app identifiers to build ghostex-dev as a separate app that
        # keeps diagnostics in ~/.ghostex-dev.
        # CDXC:DevAppFlavor 2026-05-11-12:10: ghostex-dev must not share settings,
        # projects, sessions, hooks, browser profiles, or runtime state with
        # the installed app; generated metadata now points all dev state at the
        # dev home.
        EXECUTABLE_NAME: ${GHOSTEX_APP_NAME}
        INFOPLIST_KEY_CFBundleDisplayName: ${GHOSTEX_APP_DISPLAY_NAME}
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.developer-tools
        INFOPLIST_KEY_NSLocalNetworkUsageDescription: Ghostex uses a local WebSocket bridge between the sidebar and native terminal host.
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        OTHER_LDFLAGS:
          - "$(inherited)"
          - "-lc++"
          - "-weak_framework"
          - "\"Chromium Embedded Framework\""
          - "-lcef_dll_wrapper"
        HEADER_SEARCH_PATHS:
          - "$(inherited)"
          - "${GHOSTTY_ROOT}/macos/Sources/App/macOS"
          - "${CEF_ROOT}"
        FRAMEWORK_SEARCH_PATHS:
          - "$(inherited)"
          - "${CEF_ROOT}/Release"
        LIBRARY_SEARCH_PATHS:
          - "$(inherited)"
          - "${CEF_ROOT}/build/libcef_dll_wrapper"
        CLANG_CXX_LANGUAGE_STANDARD: c++20
        CLANG_ENABLE_OBJC_ARC: YES
        # CDXC:Distribution 2026-04-27-08:37: Public notarized releases are
        # signed under Mohamad Youssef's Apple team, so the bundle identifier
        # uses the com.madda namespace expected by the brew publishing flow.
        PRODUCT_BUNDLE_IDENTIFIER: ${GHOSTEX_BUNDLE_ID}
        PRODUCT_NAME: ${GHOSTEX_APP_NAME}
